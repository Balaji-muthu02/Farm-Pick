<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Main Dashboard CSS use pannuruvom designs matching-kaga -->
    <link rel="stylesheet" href="/frontend/Farmer-Style/Farmer-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Farmer Settings - FarmPick</title>
    <style>
        .settings-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 800px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .save-btn {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .save-btn:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-separator {
            height: 1px;
            background: #f3f4f6;
            margin: 30px 0;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <!-- Mobile toggle button -->
    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>

    <!-- Sidebar (Existing Dashboard design logic) -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
            <div class="logo-text">FarmConnect</div>
        </div>

        <ul class="sidebar-menu">
            <li class="menu-item">
                <a href="/frontend/Farmer-Page/Farmer-dashboard.html" class="menu-link">
                    <span class="menu-icon"><i class="fa-solid fa-chart-pie"></i></span>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/frontend/Farmer-Page/Farmer-product-page.html" class="menu-link">
                    <span class="menu-icon"><i class="fa-solid fa-box-open"></i></span>
                    <span>Products</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/frontend/Farmer-Page/Farmer-order-page.html" class="menu-link">
                    <span class="menu-icon"><i class="fa-solid fa-cart-shopping"></i></span>
                    <span>Orders</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/frontend/Farmer-Page/Farmer-earning-page.html" class="menu-link">
                    <span class="menu-icon"><i class="fa-solid fa-wallet"></i></span>
                    <span>Earnings</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/frontend/Farmer-Page/Farmer-settings.html" class="menu-link active">
                    <span class="menu-icon"><i class="fa-solid fa-gear"></i></span>
                    <span>Settings</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="#" class="menu-link" onclick="logout()">
                    <span class="menu-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="top-header">
            <div class="welcome-section">
                <h1>Settings ⚙️</h1>
                <p>Update your personal and farm information here.</p>
            </div>
        </div>

        <section class="content-section">
            <div class="settings-card">
                <form id="settings-form">
                    <!-- Personal Details Title -->
                    <h3 class="section-title"><i class="fa-solid fa-user"></i> Personal Details</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="farmer-name">Full Name</label>
                            <input type="text" id="farmer-name" placeholder="E.g., Balaji M" required>
                        </div>
                        <div class="form-group">
                            <label for="farmer-email">Email Address</label>
                            <input type="email" id="farmer-email" placeholder="email@example.com" required>
                        </div>
                    </div>

                    <div class="section-separator"></div>

                    <!-- Farm Details Title -->
                    <h3 class="section-title"><i class="fa-solid fa-wheat-awn"></i> Farm Information</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="farm-name">Farm name</label>
                            <input type="text" id="farm-name" placeholder="E.g., Green Valley Farm">
                        </div>
                        <div class="form-group">
                            <label for="farm-phone">Phone Number</label>
                            <input type="tel" id="farm-phone" placeholder="+91 9876543210">
                        </div>
                        <div class="form-group full-width">
                            <label for="farm-location">Farm Location / Address</label>
                            <input type="text" id="farm-location" placeholder="E.g., Pollachi, Tamil Nadu">
                        </div>
                    </div>

                    <div style="margin-top: 20px;">
                        <button type="submit" class="save-btn" id="save-btn">
                            <i class="fa-solid fa-floppy-disk"></i> Save All Changes
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script type="module" src="/frontend/js/farmer-settings-page.js"></script>
</body>

</html>
