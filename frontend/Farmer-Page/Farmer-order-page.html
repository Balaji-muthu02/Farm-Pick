<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/frontend/Farmer-Style/Farmer-order-page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>Orders - FarmPick</title>
</head>

<body>
  <!-- Mobile Menu Toggle -->
  <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>

  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
      <div class="logo-text">FarmConnect</div>
    </div>

    <ul class="sidebar-menu">
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-dashboard.html" class="menu-link">
          <span class="menu-icon"><i class="fa-solid fa-chart-pie"></i></span>
          <span>Dashboard</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-product-page.html" class="menu-link">
          <span class="menu-icon"><i class="fa-solid fa-box-open"></i></span>
          <span>Products</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-order-page.html" class="menu-link active">
          <span class="menu-icon"><i class="fa-solid fa-cart-shopping"></i></span>
          <span>Orders</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-earning-page.html" class="menu-link">
          <span class="menu-icon"><i class="fa-solid fa-wallet"></i></span>
          <span>Earnings</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-settings.html" class="menu-link">
          <span class="menu-icon"><i class="fa-solid fa-gear"></i></span>
          <span>Settings</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="#" class="menu-link" onclick="logout()">
          <span class="menu-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
          <span>Logout</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Header -->
    <div class="top-header">
      <span class="breadcrumb-icon"><i class="fa-solid fa-bars-staggered"></i></span>
      <span class="breadcrumb-text">Seller Dashboard</span>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <h1>Orders</h1>
      <p>Manage and track your customer orders</p>
    </div>

    <!-- Orders Section -->
    <section class="orders-section">
      <div class="orders-grid" id="orders-grid">
        <!-- Orders will be loaded here dynamically -->
      </div>
    </section>
  </main>

  <script type="module">
    import apiRequest from "../js/api.js";
    import { getCurrentUser, logout } from "../js/auth.js";
    import { showToast } from "../js/notifications.js";
    window.logout = logout;

    async function loadOrders() {
      const user = getCurrentUser();
      if (!user || user.role !== 'farmer') {
        window.location.href = '/frontend/pages/login.html';
        return;
      }

      try {
        const orders = await apiRequest(`/orders/farmer/${user.farmer_id}`, 'GET');
        const grid = document.getElementById('orders-grid');

        if (orders.length === 0) {
          grid.innerHTML = '<p>No orders received yet.</p>';
          return;
        }

        grid.innerHTML = orders.map(order => {
          // Since all items of this farmer in this order share the same status now, 
          // we can take the status from the first item
          const itemStatus = order.items && order.items.length > 0 ? order.items[0].status : order.status;

          return `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">#ORD-${order.id}</div>
                            <div class="order-date">${new Date(order.order_date || Date.now()).toLocaleString()}</div>
                        </div>
                        <span class="status-badge status-${itemStatus}">${itemStatus}</span>
                    </div>

                    <div class="order-details">
                        <div class="detail-row">
                            <span class="detail-icon"><i class="fa-solid fa-user"></i></span>
                            <span><strong>${order.customer_name}</strong></span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-icon"><i class="fa-solid fa-envelope"></i></span>
                            <span>${order.customer_email}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-icon"><i class="fa-solid fa-location-dot"></i></span>
                            <span>${order.delivery_address || 'Home Delivery'}</span>
                        </div>
                    </div>

                    <div class="products-section">
                        <h4 style="margin: 10px 0; font-size: 14px; color: #666;">Products Ordered:</h4>
                        ${order.items && order.items.length > 0 ? order.items.map(item => `
                            <div class="product-item" style="background: #f8f9fa; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <div style="font-weight: 600; color: #2d3748;">${item.product_name}</div>
                                    <div style="font-size: 13px; color: #718096;">Qty: ${item.quantity} × ₹${item.price} | <span style="color: #4a5568;">Status: ${item.status}</span></div>
                                </div>
                                <div style="font-weight: 700; color: #38a169;">₹${item.subtotal}</div>
                            </div>
                        `).join('') : '<p style="color: #999;">No product details available</p>'}
                    </div>

                    <div class="order-total">Total: ₹${order.total_amount}</div>

                    <div class="status-update">
                        <label class="status-update-label">Update Status for Your Products</label>
                        <select class="status-select" id="status-${order.id}">
                            <option value="pending" ${itemStatus === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="shipped" ${itemStatus === 'shipped' ? 'selected' : ''}>Shipped</option>
                            <option value="delivered" ${itemStatus === 'delivered' ? 'selected' : ''}>Delivered</option>
                            <option value="cancelled" ${itemStatus === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select>
                        <button class="update-btn" onclick="updateStatus(${order.id})">Update Status</button>
                    </div>
                </div>
            `}).join('');

      } catch (err) {
        console.error(err);
      }
    }

    window.updateStatus = async (orderId) => {
      const user = getCurrentUser();
      const newStatus = document.getElementById(`status-${orderId}`).value;
      try {
        // Updated to use the farmer-specific item status endpoint
        await apiRequest(`/orders/farmer/${user.farmer_id}/order/${orderId}/status`, 'PATCH', { status: newStatus });
        showToast('Product status updated!', 'success');
        loadOrders(); // Refresh
      } catch (err) {
        showToast('Failed to update status', 'error');
      }
    };

    loadOrders();

    window.toggleSidebar = () => {
      document.getElementById("sidebar").classList.toggle("active");
    };
  </script>
</body>

</html>
