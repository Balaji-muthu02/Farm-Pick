<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/frontend/Farmer-Style/Farmer-product-page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>Manage Products - FarmPick</title>
</head>

<body>
  <!-- Mobile Menu Toggle -->
  <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>

  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
      <div class="logo-text">FarmConnect</div>
    </div>

    <ul class="sidebar-menu">
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-dashboard.html" class="menu-link">
          <span class="menu-icon"><i class="fa-solid fa-chart-pie"></i></span>
          <span>Dashboard</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-product-page.html" class="menu-link active">
          <span class="menu-icon"><i class="fa-solid fa-box-open"></i></span>
          <span>Products</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-order-page.html" class="menu-link">
          <span class="menu-icon"><i class="fa-solid fa-cart-shopping"></i></span>
          <span>Orders</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-earning-page.html" class="menu-link">
          <span class="menu-icon"><i class="fa-solid fa-wallet"></i></span>
          <span>Earnings</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="/frontend/Farmer-Page/Farmer-settings.html" class="menu-link">
          <span class="menu-icon"><i class="fa-solid fa-gear"></i></span>
          <span>Settings</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="#" class="menu-link" onclick="logout()">
          <span class="menu-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
          <span>Logout</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Header -->
    <div class="top-header">
      <span class="breadcrumb-icon"><i class="fa-solid fa-bars-staggered"></i></span>
      <span class="breadcrumb-text">Seller Dashboard</span>
    </div>

    <!-- Page Header -->
    <div class="page-header">
      <div class="header-top">
        <div class="header-content">
          <h1>Manage Products</h1>
          <p>Add, edit, or remove your farm products</p>
        </div>
        <button class="add-product-btn" onclick="location.href = '/frontend/Farmer-Page/Add-product.html'">
          <span><i class="fa-solid fa-plus"></i></span>
          <span>Add Product</span>
        </button>
      </div>

      <div class="search-container">
        <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
        <input type="text" class="search-input" placeholder="Search products..." id="search-products" />
      </div>
    </div>

    <!-- Products Grid -->
    <section class="products-section">
      <div class="products-grid" id="p-grid">
        <!-- Products will be loaded here dynamically -->
      </div>
    </section>
  </main>

  <script type="module" src="/frontend/js/farmer-products-page.js"></script>
</body>

</html>
