<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FarmPick</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <link rel="stylesheet" href="/frontend/styles/navbar-shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .checkout-layout {
            max-width: 1100px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
            padding: 0 20px;
        }

        .form-card,
        .summary-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4b5563;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f3f4f6;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: #22c55e;
            outline: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .order-item-mini {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid #f9fafb;
            padding-bottom: 15px;
        }

        .order-item-mini img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
        }

        .mini-details h4 {
            font-size: 15px;
            margin: 0;
        }

        .mini-details p {
            font-size: 13px;
            color: #6b7280;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f9fafb;
        }

        .place-order-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="first">
            <a href="/frontend/index.html" class="logo">
                <span class="logo-icon">🌱</span>
                <span class="logo-text"><span class="green">Farm</span>Pick</span>
            </a>
            <ul class="nav-links">
                <li><a href="/frontend/index.html">Home</a></li>
                <li><a href="/frontend/pages/Shop.html">Shop</a></li>
                <li><a href="/frontend/pages/About.html">About Us</a></li>
                <li><a href="/frontend/pages/Become-a-seller.html">Become a Seller</a></li>
                <li><a href="/frontend/pages/contact.html">Contact</a></li>
            </ul>
            <div class="nav-icons" id="nav-icons-container">
                <button class="icon-btn user-btn">
                    <a href="/frontend/pages/login.html"><i class="fa-solid fa-user"></i></a>
                </button>
                <button class="icon-btn cart-btn">
                    <a href="/frontend/pages/Add-to-card.html">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-badge" style="display: none;">0</span>
                    </a>
                </button>
            </div>
        </div>
    </nav>

    <div class="checkout-layout">
        <!-- Delivery Details -->
        <div class="form-card">
            <h2 class="section-title">Delivery Details</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full-name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="98765 43210" required>
                </div>
                <div class="form-group">
                    <label>Complete Address</label>
                    <input type="text" id="address" placeholder="House No, Street Name, Area" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city" placeholder="e.g. Chennai" required>
                    </div>
                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text" id="pincode" placeholder="600001" required>
                    </div>
                </div>
            </form>

            <h2 class="section-title" style="margin-top: 40px;">Payment Method</h2>
            <div class="payment-options" style="display: flex; flex-direction: column; gap: 10px;">
                <div
                    style="padding: 15px; border: 2px solid #22c55e; border-radius: 12px; display: flex; align-items: center; gap: 10px; background: #f0fdf4;">
                    <input type="radio" name="pay-method" value="COD" checked>
                    <span style="font-weight: 600; color: #065f46;">Cash on Delivery (Pay when you receive)</span>
                </div>
                <div
                    style="padding: 15px; border: 1px solid #ddd; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
                    <input type="radio" name="pay-method" value="GPAY">
                    <span style="font-weight: 600; color: #4b5563;">GPay / PhonePe / UPI 📱</span>
                </div>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="summary-card">
            <h2 class="section-title">Order Summary</h2>
            <div id="summary-items">
                <!-- Items will be loaded -->
            </div>
            <div class="total-row">
                <span>Total Amount</span>
                <span id="final-total">₹0.00</span>
            </div>
            <button type="button" class="place-order-btn" onclick="submitOrder()">Confirm Order</button>
        </div>
    </div>

    <script type="module" src="/frontend/js/checkout-page.js"></script>
    <script type="module" src="/frontend/js/main.js"></script>
</body>

</html>
